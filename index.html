<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roy's Bird Explorer</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body { margin:0; min-height:100vh; background:linear-gradient(135deg,#dff7ff,#fff8dc); color:#1f2937; }
    header { position:sticky; top:0; z-index:10; background:rgba(255,255,255,.94); backdrop-filter:blur(8px); box-shadow:0 3px 14px rgba(0,0,0,.08); padding:12px 16px; }
    .topbar { max-width:1240px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    h1 { margin:0; font-size:30px; color:#047857; }
    .subtitle { margin-top:4px; font-size:15px; color:#475569; }
    .top-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
    button, select, input { border:2px solid #cbd5e1; border-radius:14px; padding:10px 12px; font-size:15px; background:white; cursor:pointer; }
    button { font-weight:bold; color:#0f172a; }
    .primary { background:#16a34a; color:white; border-color:#16a34a; }
    .language button.active { background:#0ea5e9; color:white; border-color:#0ea5e9; }
    .layout { max-width:1240px; margin:0 auto; padding:18px; display:grid; grid-template-columns:320px 1fr; gap:18px; }
    .panel, .content { background:#ffffffdd; border-radius:24px; box-shadow:0 12px 32px rgba(0,0,0,.10); padding:18px; }
    label { display:block; font-weight:bold; margin:14px 0 7px; color:#334155; }
    select, input { width:100%; outline:none; }
    .hint { margin-top:12px; font-size:14px; color:#64748b; line-height:1.45; }
    .view-title { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:16px; }
    .view-title h2 { margin:0; color:#0f766e; }
    .count { background:#dbeafe; color:#1d4ed8; padding:8px 12px; border-radius:999px; font-weight:bold; white-space:nowrap; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:16px; }
    .bird-card { background:white; border-radius:20px; overflow:hidden; box-shadow:0 8px 20px rgba(0,0,0,.09); border:1px solid #e2e8f0; }
    .image-wrap { position:relative; height:170px; background:#e2e8f0; }
    .bird-card img { width:100%; height:100%; object-fit:cover; display:block; }
    .sound-btn { position:absolute; bottom:10px; inset-inline-end:10px; width:46px; height:46px; border-radius:50%; padding:0; background:#ffffffee; border:2px solid #0ea5e9; font-size:22px; box-shadow:0 4px 12px rgba(0,0,0,.18); }
    .sound-btn.loading { background:#fef3c7; border-color:#f59e0b; }
    .bird-card-content { padding:14px; }
    .bird-title-row { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .bird-name { font-size:21px; font-weight:bold; color:#111827; margin-bottom:4px; }
    .latin { color:#64748b; font-size:13px; margin-bottom:8px; direction:ltr; text-align:start; font-style:italic; }
    .plus-btn { flex:0 0 auto; width:42px; height:42px; border-radius:50%; padding:0; font-size:26px; line-height:1; background:#22c55e; color:white; border-color:#22c55e; }
    .seen-count { margin-top:8px; color:#0f766e; font-weight:bold; font-size:14px; }
    .rarity { margin-top:8px; color:#a16207; font-weight:bold; font-size:14px; }
    .tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
    .tag { background:#ecfeff; color:#155e75; padding:5px 8px; border-radius:999px; font-size:12px; font-weight:bold; }
    .menu-drawer { position:fixed; top:0; bottom:0; inset-inline-start:0; width:min(330px,92vw); background:white; box-shadow:8px 0 30px rgba(0,0,0,.18); z-index:30; padding:18px; transform:translateX(-110%); transition:transform .25s ease; }
    html[dir="rtl"] .menu-drawer { transform:translateX(110%); box-shadow:-8px 0 30px rgba(0,0,0,.18); }
    .menu-drawer.open { transform:translateX(0); }
    .menu-drawer h2 { margin-top:0; color:#047857; }
    .menu-item { display:block; width:100%; margin:8px 0; text-align:start; background:#f8fafc; }
    .overlay { position:fixed; inset:0; background:rgba(15,23,42,.35); z-index:20; display:none; }
    .overlay.open { display:block; }
    .world-card { background:linear-gradient(180deg,#eff6ff,#fff); border:2px solid #bfdbfe; border-radius:22px; padding:18px; text-align:center; margin-bottom:16px; }
    .world-emoji { font-size:76px; line-height:1; margin-bottom:8px; }
    .country-buttons { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:12px; }
    .country-buttons button.active { background:#16a34a; color:white; border-color:#16a34a; }
    .small-note { font-size:13px; color:#64748b; line-height:1.4; margin-top:10px; }
    .hidden { display:none!important; }
    @media(max-width:850px){ .topbar{align-items:flex-start;flex-direction:column}.layout{grid-template-columns:1fr;padding:12px}h1{font-size:24px}.top-actions{width:100%;justify-content:flex-start}.panel,.content{padding:14px;border-radius:18px}.grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}.image-wrap{height:140px}.bird-name{font-size:18px} }
  </style>
</head>
<body>
  <div id="overlay" class="overlay" onclick="toggleMenu(false)"></div>
  <nav id="menuDrawer" class="menu-drawer">
    <h2 id="menuTitle">Menu</h2>
    <button class="menu-item" onclick="setView('guide')" id="menuGuide">Bird Guide</button>
    <button class="menu-item" onclick="setView('world')" id="menuWorld">World Map</button>
    <button class="menu-item" onclick="setView('seen')" id="menuSeen">My Birds</button>
    <button class="menu-item" onclick="setView('rare')" id="menuRare">Rare Birds</button>
    <button class="menu-item" onclick="resetSeen()" id="menuReset">Reset Seen Birds</button>
  </nav>

  <header>
    <div class="topbar">
      <div>
        <h1 id="title">Roy's Bird Explorer</h1>
        <div class="subtitle" id="subtitle">100 birds, sounds, countries, and rarity</div>
      </div>
      <div class="top-actions">
        <button class="primary" onclick="toggleMenu(true)" id="menuBtn">☰ Menu</button>
        <div class="language">
          <button id="enBtn" onclick="setLanguage('en')">English</button>
          <button id="heBtn" onclick="setLanguage('he')">עברית</button>
        </div>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <label id="countryLabel" for="countrySelect">Country</label>
      <select id="countrySelect" onchange="filterBirds()"></select>

      <label id="freeTextLabel" for="freeText">Describe the bird</label>
      <input id="freeText" oninput="filterBirds()" placeholder="yellow wing, red beak, small" />

      <label id="typeLabel" for="typeSelect">Bird type</label>
      <select id="typeSelect" onchange="filterBirds()"></select>

      <label id="rarityLabel" for="raritySelect">Rarity</label>
      <select id="raritySelect" onchange="filterBirds()"></select>

      <div class="hint" id="hintText"></div>
      <div class="small-note" id="mediaNote"></div>
    </section>

    <section class="content">
      <div id="worldView" class="hidden">
        <div class="world-card">
          <div class="world-emoji">🌍</div>
          <h2 id="worldTitle">World Bird Map</h2>
          <p id="worldText">Choose a country and discover common and rare birds there.</p>
          <div id="countryButtons" class="country-buttons"></div>
        </div>
      </div>

      <div class="view-title">
        <h2 id="resultsTitle">Birds</h2>
        <div class="count" id="count">0 birds</div>
      </div>
      <div id="birdsGrid" class="grid"></div>
    </section>
  </main>

      {en:"Orange-bellied Parrot", he:"Orange-bellied Parrot", scientific:"Neophema chrysogaster", type:"parrot", countries:["Australia"], rarity:{Australia:5}, tags:"parrot rare orange belly"},
      {en:"Arctic Tern", he:"Arctic Tern", scientific:"Sterna paradisaea", type:"seabird", countries:["Iceland","UK"], rarity:{Iceland:1,UK:3}, tags:"tern white black cap red beak"},
      {en:"Common Eider", he:"Common Eider", scientific:"Somateria mollissima", type:"water", countries:["Iceland","UK"], rarity:{Iceland:1,UK:3}, tags:"duck sea bird"},
      {en:"Whooper Swan", he:"Whooper Swan", scientific:"Cygnus cygnus", type:"water", countries:["Iceland","UK"], rarity:{Iceland:1,UK:3}, tags:"white swan yellow beak"},
      {en:"Gyrfalcon", he:"Gyrfalcon", scientific:"Falco rusticolus", type:"raptor", countries:["Iceland"], rarity:{Iceland:3}, tags:"falcon large arctic"},
      {en:"Snowy Owl", he:"Snowy Owl", scientific:"Bubo scandiacus", type:"owl", countries:["Iceland","USA"], rarity:{Iceland:5,USA:4}, tags:"white owl arctic rare"},
      {en:"Rock Ptarmigan", he:"Rock Ptarmigan", scientific:"Lagopus muta", type:"gamebird", countries:["Iceland","UK"], rarity:{Iceland:1,UK:4}, tags:"ground bird white winter"}
    ];

    let lang = localStorage.getItem("birdLang") || ((navigator.language || "").startsWith("he") ? "he" : "en");
    let currentView = "guide";
    let seenCounts = JSON.parse(localStorage.getItem("birdSeenCountsV3") || "{}");
    let currentAudio = null;

    const grid = document.getElementById("birdsGrid");
    const countEl = document.getElementById("count");
    const countrySelect = document.getElementById("countrySelect");
    const typeSelect = document.getElementById("typeSelect");
    const raritySelect = document.getElementById("raritySelect");
    const freeText = document.getElementById("freeText");

    function tr(){ return translations[lang]; }
    function slug(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,""); }
    birds.forEach(b => b.id = slug(b.en));
    function normalize(s){ return String(s || "").toLowerCase().trim(); }
    function selectedCountry(){ return countrySelect.value || "Israel"; }

    function displayName(bird){
      const country = selectedCountry();
      if (lang === "he" && country === "Israel") return bird.he || bird.en;
      return bird.en;
    }

    function rarityStars(n){ return "⭐".repeat(n || 1); }
    function getRarity(bird, country){ return bird.rarity[country] || Math.min(...Object.values(bird.rarity)); }

    function setLanguage(newLang){
      lang = newLang;
      localStorage.setItem("birdLang", lang);
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === "he" ? "rtl" : "ltr";
      applyLanguage();
      filterBirds();
    }

    function applyLanguage(){
      const t = tr();
      document.title = t.title;
      title.textContent = t.title;
      subtitle.textContent = t.subtitle;
      menuBtn.textContent = t.menu;
      menuTitle.textContent = t.menuTitle;
      menuGuide.textContent = t.guide;
      menuWorld.textContent = t.world;
      menuSeen.textContent = t.seen;
      menuRare.textContent = t.rare;
      menuReset.textContent = t.reset;
      countryLabel.textContent = t.country;
      freeTextLabel.textContent = t.describe;
      typeLabel.textContent = t.type;
      rarityLabel.textContent = t.rarity;
      hintText.textContent = t.hint;
      mediaNote.textContent = t.mediaNote;
      resultsTitle.textContent = currentView === "world" ? t.worldTitle : t.possible;
      worldTitle.textContent = t.worldTitle;
      worldText.textContent = t.worldText;
      freeText.placeholder = t.placeholder;
      enBtn.classList.toggle("active", lang === "en");
      heBtn.classList.toggle("active", lang === "he");
      buildCountrySelect();
      buildTypeSelect();
      buildRaritySelect();
      buildCountryButtons();
    }

    function buildCountrySelect(){
      const old = countrySelect.value || "Israel";
      countrySelect.innerHTML = "";
      countryList.forEach(c => {
        const option = document.createElement("option");
        option.value = c;
        option.textContent = tr().countries[c] || c;
        countrySelect.appendChild(option);
      });
      countrySelect.value = old;
    }

    function buildTypeSelect(){
      const old = typeSelect.value || "";
      typeSelect.innerHTML = `<option value="">${tr().all}</option>`;
      typeList.forEach(type => {
        const option = document.createElement("option");
        option.value = type;
        option.textContent = tr().types[type] || type;
        typeSelect.appendChild(option);
      });
      typeSelect.value = old;
    }

    function buildRaritySelect(){
      const old = raritySelect.value || "";
      raritySelect.innerHTML = `
        <option value="">${tr().all}</option>
        <option value="1">⭐ ${tr().common}</option>
        <option value="2">⭐⭐</option>
        <option value="3">⭐⭐⭐</option>
        <option value="4">⭐⭐⭐⭐</option>
        <option value="5">⭐⭐⭐⭐⭐ ${tr().rareBird}</option>
      `;
      raritySelect.value = old;
    }

    function buildCountryButtons(){
      countryButtons.innerHTML = "";
      countryList.forEach(c => {
        const btn = document.createElement("button");
        btn.textContent = tr().countries[c] || c;
        btn.className = selectedCountry() === c ? "active" : "";
        btn.onclick = () => { countrySelect.value = c; filterBirds(); };
        countryButtons.appendChild(btn);
      });
    }

    function toggleMenu(open){
      menuDrawer.classList.toggle("open", open);
      overlay.classList.toggle("open", open);
    }

    function setView(view){
      currentView = view;
      toggleMenu(false);
      worldView.classList.toggle("hidden", view !== "world");
      resultsTitle.textContent = view === "world" ? tr().worldTitle : tr().possible;
      filterBirds();
    }

    function scoreBird(bird, terms){
      const text = normalize([displayName(bird), bird.en, bird.he, bird.scientific, bird.type, tr().types[bird.type], bird.tags, bird.countries.join(" ")].join(" "));
      let score = 0;
      terms.forEach(term => { if (text.includes(term)) score++; });
      return score;
    }

    function filterBirds(){
      const country = selectedCountry();
      const type = typeSelect.value;
      const minRarity = raritySelect.value;
      const terms = normalize(freeText.value).split(/\s+/).filter(Boolean);

      let list = birds
        .filter(b => b.countries.includes(country))
        .map(b => ({ bird: b, rarityValue: getRarity(b, country), score: scoreBird(b, terms) }));

      if (type) list = list.filter(x => x.bird.type === type);
      if (minRarity) list = list.filter(x => x.rarityValue >= Number(minRarity));
      if (terms.length) list = list.filter(x => x.score > 0);
      if (currentView === "seen") list = list.filter(x => (seenCounts[x.bird.id] || 0) > 0);
      if (currentView === "rare") list = list.filter(x => x.rarityValue >= 4);

      list.sort((a,b) => {
        const seen = (seenCounts[b.bird.id] || 0) - (seenCounts[a.bird.id] || 0);
        if (seen) return seen;
        if (terms.length && b.score !== a.score) return b.score - a.score;
        return a.rarityValue - b.rarityValue;
      });

      renderBirds(list, country);
      buildCountryButtons();
    }

    function renderBirds(list, country){
      grid.innerHTML = "";
      countEl.textContent = tr().count(list.length);
      if (!list.length) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#64748b;font-size:20px;padding:38px 10px;">${tr().noResults}</div>`;
        return;
      }

      list.forEach(({bird, rarityValue}) => {
        const card = document.createElement("article");
        card.className = "bird-card";
        const countries = bird.countries.map(c => tr().countries[c] || c).join(", ");
        card.innerHTML = `
          <div class="image-wrap">
            <img id="img-${bird.id}" src="${FALLBACK_IMAGE}" alt="${displayName(bird)}" loading="lazy">
            <button class="sound-btn" id="sound-${bird.id}" title="Sound" onclick="playSound('${bird.id}')">🔊</button>
          </div>
          <div class="bird-card-content">
            <div class="bird-title-row">
              <div>
                <div class="bird-name">${displayName(bird)}</div>
                <div class="latin">${bird.scientific}</div>
              </div>
              <button class="plus-btn" title="${tr().plusTitle}" onclick="addSeen('${bird.id}')">+</button>
            </div>
            <div class="seen-count">${tr().seenCount(seenCounts[bird.id] || 0)}</div>
            <div class="rarity">${tr().rarityWord}: ${rarityStars(rarityValue)} ${rarityValue >= 4 ? `· ${tr().rareBird}` : `· ${tr().common}`}</div>
            <div class="tags"><span class="tag">${tr().types[bird.type] || bird.type}</span><span class="tag">${countries}</span></div>
          </div>`;
        grid.appendChild(card);
        loadImageForBird(bird);
      });
    }

    async function loadImageForBird(bird){
      const img = document.getElementById(`img-${bird.id}`);
      if (!img) return;
      const key = `birdImageV3:${bird.id}`;
      const cached = localStorage.getItem(key);
      if (cached) { img.src = cached; return; }
      try {
        const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(bird.en)}`);
        if (!res.ok) throw new Error("No image");
        const data = await res.json();
        const image = data.thumbnail?.source || data.originalimage?.source;
        if (image) {
          localStorage.setItem(key, image);
          img.src = image;
        }
      } catch (err) {
        img.src = FALLBACK_IMAGE;
      }
    }

    async function findSoundForBird(bird){
      const key = `birdSoundV3:${bird.id}`;
      const cached = localStorage.getItem(key);
      if (cached) return cached;

      const queries = [
        `${bird.scientific} q:A`,
        `${bird.scientific}`,
        `${bird.en} q:A`,
        `${bird.en}`
      ];

      for (const q of queries) {
        try {
          const res = await fetch(`https://xeno-canto.org/api/3/recordings?query=${encodeURIComponent(q)}`);
          if (!res.ok) continue;
          const data = await res.json();
          const recordings = (data.recordings || []).filter(r => r.file || r['file-name']);
          recordings.sort((a,b) => String(a.q || "Z").localeCompare(String(b.q || "Z")));
          const rec = recordings[0];
          if (!rec) continue;
          let url = rec.file;
          if (!url && rec.id) url = `https://xeno-canto.org/${rec.id}/download`;
          if (!url) continue;
          if (url.startsWith("//")) url = "https:" + url;
          if (url.startsWith("/")) url = "https://xeno-canto.org" + url;
          localStorage.setItem(key, url);
          return url;
        } catch (err) {}
      }
      return "";
    }

    async function playSound(id){
      const bird = birds.find(b => b.id === id);
      if (!bird) return;
      const btn = document.getElementById(`sound-${id}`);
      if (btn) { btn.textContent = "⏳"; btn.classList.add("loading"); }
      const url = await findSoundForBird(bird);
      if (btn) { btn.textContent = "🔊"; btn.classList.remove("loading"); }
      if (!url) { alert(tr().soundMissing); return; }
      if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
      currentAudio = new Audio(url);
      currentAudio.crossOrigin = "anonymous";
      currentAudio.play().catch(() => {
        localStorage.removeItem(`birdSoundV3:${bird.id}`);
        alert(tr().soundMissing);
      });
    }

    function addSeen(id){
      seenCounts[id] = (seenCounts[id] || 0) + 1;
      localStorage.setItem("birdSeenCountsV3", JSON.stringify(seenCounts));
      filterBirds();
    }

    function resetSeen(){
      if (!confirm(tr().confirmReset)) return;
      seenCounts = {};
      localStorage.setItem("birdSeenCountsV3", JSON.stringify(seenCounts));
      filterBirds();
      toggleMenu(false);
    }

    document.addEventListener("keydown", e => { if (e.key === "Escape") toggleMenu(false); });

    setLanguage(lang);
    countrySelect.value = "Israel";
    filterBirds();
  </script>
