  <div id="overlay" class="overlay" onclick="toggleMenu(false)"></div>
  <nav id="menuDrawer" class="menu-drawer">

    <button class="menu-item" onclick="setView('guide')" id="menuGuide">Bird Guide</button>
    <button class="menu-item" onclick="setView('world')" id="menuWorld">World Map</button>
    <button class="menu-item" onclick="setView('seen')" id="menuSeen">My Birds</button>

  <header>
    <div class="topbar">
      <div><h1 id="title">Roy's Bird Explorer</h1><div class="subtitle" id="subtitle">Find birds by color, place, sound, and rarity</div></div>

  <main class="layout">

    <section class="content">
      <div id="worldView" class="hidden"><div class="world-card"><div class="world-emoji">🌍</div><h2 id="worldTitle">World Bird Map</h2><p id="worldText">Choose a country and discover common and rare birds there.</p><div id="countryButtons" class="country-buttons"></div></div></div>

    </section>
  </main>

    const slug=s=>s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
    function inferType(name){const n=name.toLowerCase();if(/eagle|hawk|falcon|kestrel|buzzard|kite|vulture|condor|osprey|harrier|caracara|secretarybird/.test(n))return"raptor";if(/owl|boobook|owlet/.test(n))return"owl";if(/duck|goose|swan|egret|heron|ibis|spoonbill|stork|pelican|cormorant|moorhen|coot|jacana|kingfisher|flamingo|water|merganser|scoter/.test(n))return"water";if(/gull|tern|puffin|skua|petrel|shearwater|gannet|fulmar|auk|murre|guillemot|frigatebird|kittiwake/.test(n))return"seabird";if(/parakeet|parrot|macaw|cockatoo|lorikeet|rosella|corella|amazon/.test(n))return"parrot";if(/woodpecker|flicker|flameback/.test(n))return"woodpecker";if(/lapwing|plover|sandpiper|snipe|godwit|redshank|oystercatcher|courser|phalarope/.test(n))return"shorebird";if(/partridge|quail|grouse|ptarmigan|guineafowl|peafowl|bustard/.test(n))return"gamebird";return"songbird"}
    function buildBirds(){const map={};countryList.forEach(country=>{["common","rare"].forEach(group=>{countryData[country][group].forEach(name=>{const id=slug(name);if(!map[id])map[id]={id,name:{en:name,he:heNames[name]||name},type:inferType(name),countries:[],rarity:{}};if(!map[id].countries.includes(country))map[id].countries.push(country);map[id].rarity[country]=group==="rare"?5:1;});});});return Object.values(map)}
    const birds=buildBirds();
    let lang=localStorage.getItem("birdLang")||((navigator.language||"").startsWith("he")?"he":"en"),currentView="guide",seenCounts=JSON.parse(localStorage.getItem("birdSeenCountsWorld")||"{}"),currentAudio=null;
    const grid=document.getElementById("birdsGrid"),countEl=document.getElementById("count"),countrySelect=document.getElementById("countrySelect"),typeSelect=document.getElementById("typeSelect"),raritySelect=document.getElementById("raritySelect"),freeText=document.getElementById("freeText");
    function tr(){return translations[lang]}function birdName(b){return b.name[lang]||b.name.en}function rarityStars(n){return"⭐".repeat(n||1)}function getBirdRarity(b,c){return b.rarity[c]||Math.min(...Object.values(b.rarity))}function normalize(t){return String(t||"").trim().toLowerCase()}
    function setLanguage(newLang){lang=newLang;localStorage.setItem("birdLang",lang);document.documentElement.lang=lang;document.documentElement.dir=lang==="he"?"rtl":"ltr";applyLanguage();filterBirds()}
    function applyLanguage(){const t=tr();document.title=t.title;title.textContent=t.title;subtitle.textContent=t.subtitle;menuBtn.textContent=t.menu;menuTitle.textContent=t.menuTitle;menuGuide.textContent=t.guide;menuWorld.textContent=t.world;menuSeen.textContent=t.seen;menuRare.textContent=t.rare;menuReset.textContent=t.reset;countryLabel.textContent=t.country;freeTextLabel.textContent=t.describe;typeLabel.textContent=t.type;rarityLabel.textContent=t.rarity;hintText.textContent=t.hint;mediaNote.textContent=t.mediaNote;resultsTitle.textContent=currentView==="world"?t.worldTitle:t.possible;worldTitle.textContent=t.worldTitle;worldText.textContent=t.worldText;freeText.placeholder=t.placeholder;enBtn.classList.toggle("active",lang==="en");heBtn.classList.toggle("active",lang==="he");buildCountrySelect();buildTypeSelect();buildCountryButtons()}
    function buildCountrySelect(){const selected=countrySelect.value||"Israel";countrySelect.innerHTML=`<option value="">${tr().all}</option>`;countryList.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=tr().countries[c]||c;countrySelect.appendChild(o)});countrySelect.value=selected}
    function buildTypeSelect(){const selected=typeSelect.value;typeSelect.innerHTML=`<option value="">${tr().all}</option>`;typeList.forEach(type=>{const o=document.createElement("option");o.value=type;o.textContent=tr().types[type]||type;typeSelect.appendChild(o)});typeSelect.value=selected}
    function buildCountryButtons(){countryButtons.innerHTML="";countryList.forEach(c=>{const btn=document.createElement("button");btn.textContent=tr().countries[c]||c;btn.className=countrySelect.value===c?"active":"";btn.onclick=()=>{countrySelect.value=c;filterBirds()};countryButtons.appendChild(btn)})}
    function toggleMenu(open){menuDrawer.classList.toggle("open",open);overlay.classList.toggle("open",open)}function setView(view){currentView=view;toggleMenu(false);worldView.classList.toggle("hidden",view!=="world");resultsTitle.textContent=view==="world"?tr().worldTitle:tr().possible;filterBirds()}
    function scoreBird(b,terms){const text=normalize([birdName(b),b.name.en,b.name.he,b.type,tr().types[b.type],...b.countries].join(" "));let score=0;terms.forEach(term=>{if(text.includes(term))score++});return score}
    function filterBirds(){const country=countrySelect.value,type=typeSelect.value,rarity=raritySelect.value,terms=normalize(freeText.value).split(/\s+/).filter(Boolean);let list=birds.map(b=>({bird:b,score:scoreBird(b,terms),rarityValue:getBirdRarity(b,country||b.countries[0])}));if(country)list=list.filter(x=>x.bird.countries.includes(country));if(type)list=list.filter(x=>x.bird.type===type);if(rarity)list=list.filter(x=>x.rarityValue>=Number(rarity));if(terms.length)list=list.filter(x=>x.score>0);if(currentView==="seen")list=list.filter(x=>(seenCounts[x.bird.id]||0)>0);if(currentView==="rare")list=list.filter(x=>x.rarityValue>=5);list.sort((a,b)=>{const seen=(seenCounts[b.bird.id]||0)-(seenCounts[a.bird.id]||0);if(seen)return seen;if(terms.length&&b.score!==a.score)return b.score-a.score;return b.rarityValue-a.rarityValue});renderBirds(list);buildCountryButtons()}
    function renderBirds(list){grid.innerHTML="";countEl.textContent=tr().count(list.length);if(!list.length){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;color:#64748b;font-size:20px;padding:38px 10px;">${tr().noResults}</div>`;return}list.forEach(({bird,rarityValue})=>{const card=document.createElement("article");card.className="bird-card";const countries=bird.countries.map(c=>tr().countries[c]||c).join(", ");card.innerHTML=`<div class="image-wrap"><img id="img-${bird.id}" src="${FALLBACK_IMAGE}" alt="${birdName(bird)}" loading="lazy"><button class="sound-btn" id="sound-${bird.id}" title="Sound" onclick="playSound('${bird.id}')">🔊</button></div><div class="bird-card-content"><div class="bird-title-row"><div><div class="bird-name">${birdName(bird)}</div><div class="latin">${bird.name.en}</div></div><button class="plus-btn" title="${tr().plusTitle}" onclick="addSeen('${bird.id}')">+</button></div><div class="seen-count">${tr().seenCount(seenCounts[bird.id]||0)}</div><div class="rarity">${tr().rarityWord}: ${rarityStars(rarityValue)} ${rarityValue>=5?` · ${tr().rareBird}`:` · ${tr().common}`}</div><div class="tags"><span class="tag">${tr().types[bird.type]||bird.type}</span><span class="tag">${countries}</span></div></div>`;grid.appendChild(card);loadImageForBird(bird)})}
    async function loadImageForBird(bird){const img=document.getElementById(`img-${bird.id}`);if(!img)return;const key=`birdImage:${bird.id}`;const cached=localStorage.getItem(key);if(cached){img.src=cached;return}try{const res=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(bird.name.en)}`);if(!res.ok)throw new Error("no image");const data=await res.json();const image=data.thumbnail?.source||data.originalimage?.source;if(image){localStorage.setItem(key,image);img.src=image}else img.src=FALLBACK_IMAGE}catch(e){img.src=FALLBACK_IMAGE}}
    async function findSoundForBird(bird){const key=`birdSound:${bird.id}`;const cached=localStorage.getItem(key);if(cached)return cached;const country=countrySelect.value;const q=country?`${bird.name.en} cnt:${country}`:bird.name.en;try{const res=await fetch(`https://xeno-canto.org/api/3/recordings?query=${encodeURIComponent(q)}`);if(!res.ok)throw new Error("no sound");const data=await res.json();const rec=(data.recordings||[]).find(r=>r.file);if(!rec)return"";let file=rec.file;if(file.startsWith("//"))file="https:"+file;if(file.startsWith("/"))file="https://xeno-canto.org"+file;localStorage.setItem(key,file);return file}catch(e){return""}}
    async function playSound(id){const bird=birds.find(b=>b.id===id);if(!bird)return;const btn=document.getElementById(`sound-${id}`);if(btn)btn.textContent="⏳";const url=await findSoundForBird(bird);if(btn)btn.textContent="🔊";if(!url){alert(tr().soundMissing);return}if(currentAudio){currentAudio.pause();currentAudio.currentTime=0}currentAudio=new Audio(url);currentAudio.play().catch(()=>alert(tr().soundMissing))}
    function addSeen(id){seenCounts[id]=(seenCounts[id]||0)+1;localStorage.setItem("birdSeenCountsWorld",JSON.stringify(seenCounts));filterBirds()}function resetSeen(){if(!confirm(tr().confirmReset))return;seenCounts={};localStorage.setItem("birdSeenCountsWorld",JSON.stringify(seenCounts));filterBirds();toggleMenu(false)}document.addEventListener("keydown",e=>{if(e.key==="Escape")toggleMenu(false)});setLanguage(lang);countrySelect.value="Israel";filterBirds();
  </script>
</body>
</html>
